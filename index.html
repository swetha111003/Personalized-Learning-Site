<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartLearn AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
            padding: 60px 20px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
            background: #6366f1;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #4f46e5;
        }

        .result {
            margin-top: 20px;
            text-align: left;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h1>SmartLearn AI</h1>
<p class="subtitle">Adaptive Learning + AI Tutor</p>

<div class="card">

    <input type="text" id="userId" placeholder="Enter User ID">
    <input type="text" id="question" placeholder="Ask your question">

    <button onclick="askAI()">Get Personalized Learning</button>

    <div class="result">
        <h3>Recommended Topics</h3>
        <div id="recommendations">-</div>
    </div>

    <div class="result">
        <h3>AI Tutor Response</h3>
        <div id="aiResponse">-</div>
    </div>

</div>

<script>
async function askAI() {

    const userId = document.getElementById("userId").value;
    const question = document.getElementById("question").value;

    if (!userId || !question) {
        alert("Please enter User ID and Question");
        return;
    }

    try {
        const response = await fetch("YOUR_BACKEND_API_URL", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userId, question })
        });

        const data = await response.json();

        document.getElementById("recommendations").innerHTML =
            data.recommendedTopics?.join("<br>") || "No recommendations";

        document.getElementById("aiResponse").innerText =
            data.aiResponse?.content?.[0]?.text || "No response";

    } catch (error) {
        document.getElementById("aiResponse").innerText =
            "Error connecting to backend.";
    }
}
</script>

</body>
</html>
